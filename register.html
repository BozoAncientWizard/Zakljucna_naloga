<!DOCTYPE html>
<html lang="sl">
<head>
<meta charset="UTF-8">
<title>Registracija</title>
<style>
body {
    font-family: Arial, sans-serif;
    background-color: #f2f2f2;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
}

.container {
    background-color: #fff;
    padding: 30px 40px;
    border-radius: 10px;
    box-shadow: 0 0 15px rgba(0,0,0,0.2);
    width: 300px;
    text-align: center;
}

h2 {
    margin-bottom: 20px;
    color: #333;
}

input[type="text"], input[type="password"] {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button {
    padding: 10px 20px;
    margin-top: 10px;
    border: none;
    border-radius: 5px;
    background-color: #4CAF50;
    color: #fff;
    cursor: pointer;
}

button:hover {
    background-color: #45a049;
}

a {
    display: block;
    margin-top: 15px;
    text-decoration: none;
    color: #555;
}

a:hover {
    text-decoration: underline;
}
</style>
</head>
<body>
<div class="container">
    <h2>Registracija</h2>
    <form action="/register" method="POST">
        <input type="text" name="username" placeholder="Uporabniško ime" required><br>
        <input type="password" name="password" placeholder="Geslo" required><br>
        <button type="submit">Registriraj</button>
    </form>
    <a href="login.html">Prijava</a>
    <a href="Dom.html">Nazaj na Dom</a>
</div>
</body>
</html>
